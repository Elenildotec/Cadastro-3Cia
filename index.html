<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ficha Cadastral PMESP</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>

</head>

<body>

<div class="container">

    <h1>FICHA CADASTRAL PMESP</h1>

    <form id="fichaForm">

        <!-- DADOS PESSOAIS -->

        <section>

            <h2>Dados Pessoais</h2>

            <input type="text" id="nome" placeholder="Nome Completo">

            <input type="text" id="posto" placeholder="Posto / Graduação">

            <input type="text" id="re" placeholder="RE">

            <input type="text" id="guerra" placeholder="Nome de Guerra">

            <label>Data de Admissão</label>
            <input type="date" id="admissao">

            <label>Data de Nascimento</label>
            <input type="date" id="nascimento">

            <input type="text" id="civil" placeholder="Estado Civil">

            <input type="text" id="sangue" placeholder="Tipo Sanguíneo">

            <input type="text" id="endereco" placeholder="Endereço">

            <input type="text" id="bairro" placeholder="Bairro">

            <input type="text" id="municipio" placeholder="Município">

            <input type="text" id="celular" placeholder="Celular">

            <input type="text" id="residencial" placeholder="Telefone Residencial">

            <input type="text" id="recado" placeholder="Telefone para Recado">

            <input type="email" id="emailf" placeholder="E-mail Funcional">

            <input type="email" id="emailp" placeholder="E-mail Particular">

        </section>

        <!-- CONJUGE -->

        <section>

            <h2>Dados do Cônjuge</h2>

            <input type="text" id="conjugeNome" placeholder="Nome Completo">

            <input type="text" id="conjugeCpf" placeholder="CPF">

            <label>Data de Nascimento</label>
            <input type="date" id="conjugeNascimento">

            <input type="text" id="conjugeTelefone" placeholder="Telefone">

            <input type="text" id="conjugeProfissao" placeholder="Profissão">

        </section>

        <!-- DEPENDENTES -->

        <section>

            <h2>Dependentes</h2>

            <div id="dependentesContainer"></div>

            <button
                type="button"
                class="btnAdicionar"
                onclick="adicionarDependente()">
                + Adicionar Dependente
            </button>

        </section>

        <!-- CONTATO EMERGÊNCIA -->

        <section>

            <h2>Contato de Emergência</h2>

            <textarea
                id="contato1"
                placeholder="Nome, parentesco e telefone">
            </textarea>

            <textarea
                id="contato2"
                placeholder="Nome, parentesco e telefone">
            </textarea>

        </section>

        <!-- DOCUMENTOS -->

        <section>

            <h2>Documentos</h2>

            <input type="text" id="rg" placeholder="RG">

            <input type="text" id="cpf" placeholder="CPF">

            <input type="text" id="cnh" placeholder="CNH">

            <input type="text" id="categoria" placeholder="Categoria CNH">

            <input type="text" id="titulo" placeholder="Título Eleitoral">

            <input type="text" id="zona" placeholder="Zona">

            <input type="text" id="secao" placeholder="Seção">

            <input type="text" id="municipioTitulo" placeholder="Município do Título">

            <input type="text" id="escola" placeholder="Escola em que Vota">

            <input type="text" id="endEleitoral" placeholder="Endereço Eleitoral">

        </section>

        <!-- DADOS FUNCIONAIS -->

        <section>

            <h2>Dados Funcionais</h2>

            <textarea
                id="cursosPM"
                placeholder="Cursos realizados na PMESP">
            </textarea>

            <input type="text" id="laurea" placeholder="Láurea de Mérito Pessoal">

            <label>Última Promoção</label>
            <input type="date" id="promocao">

            <input type="text" id="sat" placeholder="Habilitação SAT">

            <textarea
                id="unidades"
                placeholder="Unidades anteriores">
            </textarea>

            <textarea
                id="arma"
                placeholder="Arma Particular">
            </textarea>

        </section>

        <!-- ESCOLARIDADE -->

        <section>

            <h2>Escolaridade</h2>

            <label class="checkbox">
                <input type="checkbox" id="medio">
                Ensino Médio
            </label>

            <label class="checkbox">
                <input type="checkbox" id="superior">
                Ensino Superior
            </label>

            <input type="text" id="graduacao" placeholder="Graduação">

            <textarea
                id="outrosCursos"
                placeholder="Cursos em outras instituições">
            </textarea>

        </section>

        <!-- DADOS BANCARIOS -->

        <section>

            <h2>Dados Bancários</h2>

            <input type="text" id="banco" placeholder="Banco">

            <input type="text" id="agencia" placeholder="Agência">

            <input type="text" id="conta" placeholder="Conta Corrente">

        </section>

        <!-- ASSINATURA -->

        <section>

            <h2>Assinatura</h2>

            <canvas
                id="signature-pad"
                width="800"
                height="250">
            </canvas>

            <button
                type="button"
                class="btnLimpar"
                onclick="limparAssinatura()">
                Limpar Assinatura
            </button>

        </section>

        <button
            type="button"
            class="btnPdf"
            onclick="gerarPDF()">
            GERAR PDF
        </button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
